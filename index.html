<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gist 节点管理工具</title>
  <script src="vendor/js-yaml.min.js"></script>
  <script src="vendor/lucide.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #15212f;
      --muted: #637083;
      --line: #d8dee8;
      --soft: #f3f6fa;
      --panel: #ffffff;
      --accent: #1769aa;
      --accent-strong: #0f5288;
      --danger: #ba2d2d;
      --ok: #0d7a4f;
      --warn: #a76a00;
      --shadow: 0 8px 24px rgba(21, 33, 47, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #eef2f6;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      height: 38px;
      border-radius: 7px;
      padding: 0 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: nowrap;
    }

    button:hover {
      border-color: #a9b6c7;
      background: #f9fbfd;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.primary:hover {
      background: var(--accent-strong);
    }

    button.danger {
      color: var(--danger);
      border-color: #e4b5b5;
    }

    button.icon {
      width: 38px;
      padding: 0;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
    }

    aside {
      background: #fcfdff;
      border-right: 1px solid var(--line);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    main {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 24px;
      letter-spacing: 0;
    }

    h2 {
      font-size: 16px;
      letter-spacing: 0;
    }

    h3 {
      font-size: 14px;
      letter-spacing: 0;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .side-section,
    .toolbar,
    .node-list,
    .editor,
    .latency {
      padding: 16px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(23, 105, 170, 0.12);
    }

    textarea {
      min-height: 128px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
    }

    .status.good {
      color: var(--ok);
    }

    .status.bad {
      color: var(--danger);
    }

    .status.warn {
      color: var(--warn);
    }

    .node-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }

    .node-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 124px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      background: #fff;
    }

    .node-card header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .node-name {
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .node-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .rename-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .rename-row input {
      height: 38px;
      min-width: 0;
    }

    .checkline {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--danger);
      font-size: 13px;
    }

    .checkline input {
      width: 16px;
      height: 16px;
    }

    .split {
      display: grid;
      grid-template-columns: minmax(300px, 420px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .latency-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .latency-table th,
    .latency-table td {
      border-bottom: 1px solid var(--line);
      padding: 9px 8px;
      text-align: left;
      vertical-align: top;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 62px;
      height: 24px;
      border-radius: 999px;
      padding: 0 9px;
      background: var(--soft);
      font-size: 12px;
      color: var(--muted);
    }

    .pill.good {
      color: var(--ok);
      background: #e8f6ef;
    }

    .pill.warn {
      color: var(--warn);
      background: #fff4d9;
    }

    .pill.bad {
      color: var(--danger);
      background: #fae9e9;
    }

    .preview {
      min-height: 340px;
      max-height: 62vh;
      overflow: auto;
      background: #0f1720;
      color: #d9e6f2;
      border-radius: 8px;
      padding: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      white-space: pre;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 960px) {
      .app,
      .split {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="stack">
        <h1>Gist 节点管理工具</h1>
        <p class="muted">用自己的 GitHub Gist 管理 Clash/Mihomo 订阅配置。</p>
      </div>

      <section class="panel side-section stack">
        <h2>GitHub</h2>
        <div class="field">
          <label for="gistOwner">GitHub 用户名</label>
          <input id="gistOwner" placeholder="例如 octocat">
        </div>
        <div class="field">
          <label for="gistId">Gist ID</label>
          <input id="gistId" placeholder="粘贴你的 Gist ID">
        </div>
        <div class="field">
          <label for="gistFile">文件名</label>
          <input id="gistFile" value="config.yaml">
        </div>
        <div class="field">
          <label for="token">GitHub token</label>
          <input id="token" type="password" autocomplete="off" placeholder="需要 gist 权限">
        </div>
        <div class="row">
          <button id="saveToken" title="只保存在这台电脑的浏览器里"><i data-lucide="key-round"></i>保存</button>
          <button id="loadGist" class="primary"><i data-lucide="download-cloud"></i>读取</button>
        </div>
        <p class="muted">Private/secret gist 更新需要 token。读取失败时，可以把配置粘到右侧原文框。</p>
      </section>

      <section class="panel side-section stack">
        <h2>订阅</h2>
        <input id="subscription" readonly placeholder="填写 GitHub 用户名、Gist ID 和文件名后自动生成">
        <button id="copySub"><i data-lucide="copy"></i>复制订阅地址</button>
      </section>

      <section class="panel side-section stack">
        <h2>检测接口</h2>
        <div class="field">
          <label for="controller">Clash/Mihomo 控制地址</label>
          <input id="controller" value="http://127.0.0.1:9090">
        </div>
        <div class="field">
          <label for="secret">控制接口 secret</label>
          <input id="secret" type="password" autocomplete="off" placeholder="没设置就留空">
        </div>
        <button id="saveController"><i data-lucide="plug"></i>保存检测设置</button>
        <p class="muted">如果检测连不上，在配置里启用 external-controller 后重启 Clash/Mihomo。</p>
      </section>
    </aside>

    <main>
      <section class="panel toolbar">
        <div>
          <h2>当前节点</h2>
          <div id="summary" class="muted">等待读取配置</div>
        </div>
        <div class="toolbar-actions">
          <button id="addController"><i data-lucide="settings-2"></i>补上检测接口</button>
          <button id="copyYaml"><i data-lucide="copy"></i>复制配置</button>
          <button id="downloadYaml"><i data-lucide="file-down"></i>下载</button>
          <button id="pushGist" class="primary"><i data-lucide="upload-cloud"></i>更新 Gist</button>
        </div>
        <div id="status" class="status"></div>
      </section>

      <section class="split">
        <div class="stack">
          <section class="panel editor stack">
            <h2>新增 vless</h2>
            <textarea id="vlessInput" placeholder="一行一个 vless:// 链接"></textarea>
            <div class="row">
              <button id="addNodes" class="primary"><i data-lucide="plus"></i>加入节点</button>
              <button id="clearAdd"><i data-lucide="eraser"></i>清空</button>
            </div>
          </section>

          <section class="panel latency stack">
            <div class="row" style="justify-content: space-between;">
              <h2>延迟检测</h2>
              <button id="testAll"><i data-lucide="activity"></i>检测全部</button>
            </div>
            <div class="field">
              <label for="delayUrl">测试目标</label>
              <select id="delayUrl">
                <option value="https://www.gstatic.com/generate_204">Google 204</option>
                <option value="https://www.baidu.com/favicon.ico">百度</option>
                <option value="https://www.qq.com/favicon.ico">腾讯</option>
                <option value="https://www.taobao.com/favicon.ico">淘宝</option>
                <option value="https://www.bilibili.com/favicon.ico">Bilibili</option>
                <option value="https://www.microsoft.com/favicon.ico">Microsoft</option>
              </select>
            </div>
            <div style="overflow:auto;">
              <table class="latency-table">
                <thead>
                  <tr>
                    <th>节点</th>
                    <th>延迟</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="latencyRows"></tbody>
              </table>
            </div>
          </section>
        </div>

        <div class="stack">
          <section class="panel node-list stack">
            <div class="row" style="justify-content: space-between;">
              <h2>节点列表</h2>
              <button id="removeSelected" class="danger"><i data-lucide="trash-2"></i>删除勾选</button>
            </div>
            <div id="nodeGrid" class="node-grid"></div>
          </section>

          <section class="panel editor stack">
            <div class="row" style="justify-content: space-between;">
              <h2>配置原文</h2>
              <button id="parseYaml"><i data-lucide="refresh-cw"></i>重新解析</button>
            </div>
            <textarea id="yamlText" style="min-height: 260px;"></textarea>
          </section>

          <section class="panel editor stack">
            <h2>生成预览</h2>
            <pre id="preview" class="preview"></pre>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    const DEFAULT_FILE = 'config.yaml';
    const state = {
      config: null,
      yaml: '',
      latency: new Map(),
    };

    const $ = (id) => document.getElementById(id);

    function setStatus(message, kind = '') {
      const el = $('status');
      el.textContent = message;
      el.className = `status ${kind}`;
    }

    function currentGist() {
      return {
        owner: $('gistOwner').value.trim(),
        id: $('gistId').value.trim(),
        file: $('gistFile').value.trim() || DEFAULT_FILE,
      };
    }

    function subscriptionUrl() {
      const gist = currentGist();
      if (!gist.owner || !gist.id || !gist.file) return '';
      return `https://gist.githubusercontent.com/${encodeURIComponent(gist.owner)}/${encodeURIComponent(gist.id)}/raw/${encodeURIComponent(gist.file)}`;
    }

    function updateSubscriptionField() {
      $('subscription').value = subscriptionUrl();
    }

    function authHeaders() {
      const token = $('token').value.trim();
      return token ? { Authorization: `Bearer ${token}` } : {};
    }

    function normalizeName(name) {
      return String(name || '').trim();
    }

    function proxyNames() {
      return new Set((state.config?.proxies || []).map((proxy) => normalizeName(proxy.name)));
    }

    function dumpConfig() {
      return jsyaml.dump(state.config, {
        lineWidth: -1,
        noRefs: true,
        quotingType: '"',
        forceQuotes: false,
      });
    }

    function updateYamlFromConfig() {
      state.yaml = dumpConfig();
      $('yamlText').value = state.yaml;
      $('preview').textContent = state.yaml;
      render();
    }

    function parseYamlText() {
      const text = $('yamlText').value.trim();
      if (!text) {
        setStatus('配置原文为空。', 'bad');
        return;
      }
      try {
        const parsed = jsyaml.load(text);
        if (!parsed || !Array.isArray(parsed.proxies)) {
          throw new Error('没有找到 proxies 列表');
        }
        state.config = parsed;
        state.yaml = text;
        $('preview').textContent = dumpConfig();
        render();
        const issues = validateConfig();
        setStatus(issues.length ? `配置已解析，但有风险：${issues[0]}` : '配置已解析。', issues.length ? 'warn' : 'good');
      } catch (error) {
        setStatus(`解析失败：${error.message}`, 'bad');
      }
    }

    function render() {
      const proxies = state.config?.proxies || [];
      $('summary').textContent = `${proxies.length} 个节点，${state.config?.['proxy-groups']?.length || 0} 个策略组`;
      const grid = $('nodeGrid');
      grid.innerHTML = '';
      proxies.forEach((proxy) => {
        const card = document.createElement('article');
        card.className = 'node-card';
        card.dataset.proxyName = proxy.name || '';
        card.innerHTML = `
          <header>
            <div class="node-name"></div>
            <label class="checkline"><input type="checkbox" data-delete="${escapeHtml(proxy.name)}">删除</label>
          </header>
          <div class="node-meta">
            <span>类型：${escapeHtml(proxy.type || '-')}</span>
            <span>端口：${escapeHtml(proxy.port || '-')}</span>
            <span>地址：${escapeHtml(proxy.server || '-')}</span>
            <span>TLS：${proxy.tls ? '开' : '关'}</span>
          </div>
          <div class="rename-row">
            <input data-rename-input value="${escapeHtml(proxy.name || '')}" aria-label="节点新名称">
            <button data-rename="${escapeHtml(proxy.name)}" title="保存节点名称"><i data-lucide="pencil"></i>重命名</button>
          </div>
          <div class="muted">${escapeHtml(proxy.servername || proxy.network || '')}</div>
        `;
        card.querySelector('.node-name').textContent = proxy.name || '(未命名)';
        grid.appendChild(card);
      });
      grid.querySelectorAll('[data-rename]').forEach((button) => {
        button.addEventListener('click', () => {
          const oldName = button.dataset.rename;
          const input = button.closest('.node-card')?.querySelector('[data-rename-input]');
          renameProxy(oldName, input?.value || '');
        });
      });
      renderLatencyRows();
      if (window.lucide) window.lucide.createIcons();
    }

    function renderLatencyRows() {
      const rows = $('latencyRows');
      rows.innerHTML = '';
      (state.config?.proxies || []).forEach((proxy) => {
        const item = state.latency.get(proxy.name);
        const pillClass = item?.ok ? (item.delay < 350 ? 'good' : item.delay < 900 ? 'warn' : 'bad') : item ? 'bad' : '';
        const label = item ? (item.ok ? `${item.delay} ms` : item.message) : '未测';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(proxy.name)}</td>
          <td><span class="pill ${pillClass}">${escapeHtml(label)}</span></td>
          <td><button title="检测这个节点" data-test="${escapeHtml(proxy.name)}"><i data-lucide="radar"></i>检测</button></td>
        `;
        rows.appendChild(tr);
      });
      rows.querySelectorAll('[data-test]').forEach((button) => {
        button.addEventListener('click', () => testProxy(button.dataset.test));
      });
      if (window.lucide) window.lucide.createIcons();
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function parseVless(link, index) {
      let url;
      try {
        url = new URL(link.trim());
      } catch {
        throw new Error(`第 ${index + 1} 行不是有效链接`);
      }
      if (url.protocol !== 'vless:') {
        throw new Error(`第 ${index + 1} 行不是 vless 链接`);
      }
      const params = url.searchParams;
      const name = decodeURIComponent(url.hash.replace(/^#/, '')) || `${url.hostname}-${Date.now()}`;
      const proxy = {
        name: uniqueName(name),
        type: 'vless',
        server: url.hostname,
        port: Number(url.port || 443),
        uuid: url.username,
        udp: true,
      };
      const security = params.get('security');
      if (security === 'tls' || security === 'reality') proxy.tls = true;
      if (params.get('sni')) proxy.servername = params.get('sni');
      if (params.get('fp')) proxy['client-fingerprint'] = params.get('fp');
      if (params.get('flow')) proxy.flow = params.get('flow');
      if (params.get('type')) proxy.network = params.get('type');
      if (security === 'reality') {
        proxy['skip-cert-verify'] = true;
        proxy['reality-opts'] = {};
        if (params.get('pbk')) proxy['reality-opts']['public-key'] = params.get('pbk');
        if (params.get('sid')) proxy['reality-opts']['short-id'] = params.get('sid');
      }
      if (params.get('path')) proxy['ws-opts'] = { path: params.get('path') };
      if (params.get('host')) {
        proxy['ws-opts'] = proxy['ws-opts'] || {};
        proxy['ws-opts'].headers = { Host: params.get('host') };
      }
      return proxy;
    }

    function reservedNames() {
      const names = new Set(['DIRECT', 'REJECT', 'REJECT-DROP', 'PASS', 'GLOBAL']);
      (state.config?.['proxy-groups'] || []).forEach((group) => {
        if (group?.name) names.add(normalizeName(group.name));
      });
      return names;
    }

    function uniqueName(base, excludeName = '') {
      const names = new Set([...proxyNames(), ...reservedNames()]);
      if (excludeName) names.delete(excludeName);
      let name = base;
      let suffix = 2;
      while (names.has(name)) {
        name = `${base}-${suffix}`;
        suffix += 1;
      }
      return name;
    }

    function addToGroups(newNames) {
      const groups = state.config['proxy-groups'] || [];
      const currentNames = proxyNames();
      groups.forEach((group) => {
        if (!Array.isArray(group.proxies)) return;
        const hasManagedNode = group.proxies.some((name) => currentNames.has(name));
        const isAutoGroup = group.type === 'url-test' || group.name === '自动选择';
        if (!hasManagedNode && !isAutoGroup) return;
        newNames.forEach((name) => {
          if (!group.proxies.includes(name)) group.proxies.push(name);
        });
      });
    }

    function addNodes() {
      if (!state.config) {
        setStatus('先读取或粘贴配置。', 'warn');
        return;
      }
      const lines = $('vlessInput').value.split(/\n+/).map((line) => line.trim()).filter(Boolean);
      if (!lines.length) {
        setStatus('没有要加入的链接。', 'warn');
        return;
      }
      try {
        const nodes = lines.map(parseVless);
        state.config.proxies = state.config.proxies || [];
        state.config.proxies.push(...nodes);
        addToGroups(nodes.map((node) => node.name));
        updateYamlFromConfig();
        setStatus(`已加入 ${nodes.length} 个节点。`, 'good');
      } catch (error) {
        setStatus(error.message, 'bad');
      }
    }

    function validateConfig() {
      const issues = [];
      const seenProxies = new Set();
      const duplicateProxies = new Set();
      (state.config?.proxies || []).forEach((proxy) => {
        const name = normalizeName(proxy.name);
        if (!name) issues.push('有节点名称为空');
        if (seenProxies.has(name)) duplicateProxies.add(name);
        seenProxies.add(name);
      });
      duplicateProxies.forEach((name) => issues.push(`节点名重复：${name}`));
      const groups = reservedNames();
      (state.config?.proxies || []).forEach((proxy) => {
        const name = normalizeName(proxy.name);
        if (groups.has(name)) issues.push(`节点名和策略组/系统名冲突：${name}`);
      });
      return issues;
    }

    function renameProxy(oldName, nextName) {
      if (!state.config) return;
      const trimmedOldName = normalizeName(oldName);
      const trimmedNextName = normalizeName(nextName);
      if (!trimmedOldName || !trimmedNextName) {
        setStatus('节点名称不能为空。', 'warn');
        return;
      }
      if (reservedNames().has(trimmedNextName)) {
        setStatus(`不能改成 ${trimmedNextName}，这个名字已经被策略组或系统占用了。`, 'warn');
        return;
      }
      const proxy = (state.config.proxies || []).find((item) => item.name === trimmedOldName);
      if (!proxy) {
        setStatus('没有找到这个节点。', 'bad');
        return;
      }
      const finalName = uniqueName(trimmedNextName, trimmedOldName);
      proxy.name = finalName;
      (state.config['proxy-groups'] || []).forEach((group) => {
        if (!Array.isArray(group.proxies)) return;
        group.proxies = group.proxies.map((name) => name === trimmedOldName ? finalName : name);
      });
      if (state.latency.has(trimmedOldName)) {
        state.latency.set(finalName, state.latency.get(trimmedOldName));
        state.latency.delete(trimmedOldName);
      }
      updateYamlFromConfig();
      setStatus(finalName === trimmedNextName ? `已重命名为 ${finalName}。` : `名称重复，已重命名为 ${finalName}。`, 'good');
    }

    function removeSelected() {
      if (!state.config) return;
      const selected = [...document.querySelectorAll('[data-delete]:checked')].map((el) => el.dataset.delete);
      if (!selected.length) {
        setStatus('没有勾选要删除的节点。', 'warn');
        return;
      }
      const selectedSet = new Set(selected);
      state.config.proxies = (state.config.proxies || []).filter((proxy) => !selectedSet.has(proxy.name));
      (state.config['proxy-groups'] || []).forEach((group) => {
        if (Array.isArray(group.proxies)) {
          group.proxies = group.proxies.filter((name) => !selectedSet.has(name));
        }
      });
      selected.forEach((name) => state.latency.delete(name));
      updateYamlFromConfig();
      setStatus(`已删除 ${selected.length} 个节点。`, 'good');
    }

    async function loadGist() {
      const gist = currentGist();
      if (!gist.id) {
        setStatus('先填写 Gist ID。', 'warn');
        return;
      }
      setStatus('正在读取 Gist...');
      try {
        const response = await fetch(`https://api.github.com/gists/${gist.id}`, {
          headers: { Accept: 'application/vnd.github+json', ...authHeaders() },
        });
        if (!response.ok) throw new Error(`GitHub API ${response.status}`);
        const gistData = await response.json();
        if (!$('gistOwner').value.trim() && gistData.owner?.login) {
          $('gistOwner').value = gistData.owner.login;
        }
        const content = gistData.files?.[gist.file]?.content;
        if (!content) throw new Error(`没有找到文件 ${gist.file}`);
        updateSubscriptionField();
        $('yamlText').value = content;
        parseYamlText();
        setStatus('已读取 Gist。', 'good');
      } catch (error) {
        setStatus(`读取失败：${error.message}`, 'bad');
      }
    }

    async function pushGist() {
      if (!state.config) {
        setStatus('没有可更新的配置。', 'warn');
        return;
      }
      const token = $('token').value.trim();
      if (!token) {
        setStatus('更新 private gist 需要 GitHub token。', 'warn');
        return;
      }
      const gist = currentGist();
      if (!gist.id) {
        setStatus('先填写 Gist ID。', 'warn');
        return;
      }
      const issues = validateConfig();
      if (issues.length) {
        setStatus(`先修复配置：${issues[0]}`, 'bad');
        return;
      }
      const content = dumpConfig();
      setStatus('正在更新 Gist...');
      try {
        const response = await fetch(`https://api.github.com/gists/${gist.id}`, {
          method: 'PATCH',
          headers: {
            Accept: 'application/vnd.github+json',
            'Content-Type': 'application/json',
            ...authHeaders(),
          },
          body: JSON.stringify({ files: { [gist.file]: { content } } }),
        });
        if (!response.ok) {
          const text = await response.text();
          throw new Error(`${response.status} ${text.slice(0, 140)}`);
        }
        updateSubscriptionField();
        setStatus('Gist 已更新，订阅地址已同步。', 'good');
      } catch (error) {
        setStatus(`更新失败：${error.message}`, 'bad');
      }
    }

    async function testProxy(name) {
      const controller = $('controller').value.trim().replace(/\/$/, '');
      const target = $('delayUrl').value;
      const headers = {};
      const secret = $('secret').value.trim();
      if (secret) headers.Authorization = `Bearer ${secret}`;
      state.latency.set(name, { ok: false, message: '检测中' });
      renderLatencyRows();
      try {
        const url = `${controller}/proxies/${encodeURIComponent(name)}/delay?timeout=5000&url=${encodeURIComponent(target)}`;
        const response = await fetch(url, { headers });
        if (!response.ok) throw new Error(`接口 ${response.status}`);
        const data = await response.json();
        if (typeof data.delay !== 'number') throw new Error(data.message || '没有返回 delay');
        state.latency.set(name, { ok: true, delay: data.delay });
      } catch (error) {
        state.latency.set(name, { ok: false, message: error.message.replace(/^Failed to fetch$/, '连接失败') });
      }
      renderLatencyRows();
    }

    async function testAll() {
      const names = (state.config?.proxies || []).map((proxy) => proxy.name);
      if (!names.length) {
        setStatus('没有可检测的节点。', 'warn');
        return;
      }
      setStatus('正在检测全部节点...');
      for (const name of names) {
        await testProxy(name);
      }
      setStatus('检测完成。', 'good');
    }

    function addControllerToConfig() {
      if (!state.config) {
        setStatus('先读取或粘贴配置。', 'warn');
        return;
      }
      const controllerUrl = new URL($('controller').value.trim() || 'http://127.0.0.1:9090');
      state.config['external-controller'] = `${controllerUrl.hostname}:${controllerUrl.port || '9090'}`;
      const secret = $('secret').value.trim();
      if (secret) state.config.secret = secret;
      updateYamlFromConfig();
      setStatus('已在配置里补上检测接口，更新 Gist 后客户端重启生效。', 'good');
    }

    function downloadYaml() {
      const blob = new Blob([dumpConfig()], { type: 'text/yaml;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = currentGist().file || 'config.yaml';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function saveSettings() {
      localStorage.setItem('markonly-token', $('token').value);
      localStorage.setItem('markonly-gist-owner', $('gistOwner').value);
      localStorage.setItem('markonly-gist-id', $('gistId').value);
      localStorage.setItem('markonly-gist-file', $('gistFile').value);
      localStorage.setItem('markonly-controller', $('controller').value);
      localStorage.setItem('markonly-secret', $('secret').value);
      setStatus('设置已保存在本机浏览器。', 'good');
    }

    function restoreSettings() {
      $('token').value = localStorage.getItem('markonly-token') || '';
      $('gistOwner').value = localStorage.getItem('markonly-gist-owner') || '';
      $('gistId').value = localStorage.getItem('markonly-gist-id') || '';
      $('gistFile').value = localStorage.getItem('markonly-gist-file') || DEFAULT_FILE;
      $('controller').value = localStorage.getItem('markonly-controller') || 'http://127.0.0.1:9090';
      $('secret').value = localStorage.getItem('markonly-secret') || '';
      updateSubscriptionField();
    }

    async function copyText(text, okMessage) {
      await navigator.clipboard.writeText(text);
      setStatus(okMessage, 'good');
    }

    $('saveToken').addEventListener('click', saveSettings);
    $('saveController').addEventListener('click', saveSettings);
    $('loadGist').addEventListener('click', loadGist);
    $('pushGist').addEventListener('click', pushGist);
    $('addNodes').addEventListener('click', addNodes);
    $('clearAdd').addEventListener('click', () => { $('vlessInput').value = ''; });
    $('removeSelected').addEventListener('click', removeSelected);
    $('parseYaml').addEventListener('click', parseYamlText);
    $('copyYaml').addEventListener('click', () => copyText(dumpConfig(), '配置已复制。'));
    ['gistOwner', 'gistId', 'gistFile'].forEach((id) => {
      $(id).addEventListener('input', updateSubscriptionField);
      $(id).addEventListener('change', updateSubscriptionField);
    });
    $('copySub').addEventListener('click', () => {
      const url = subscriptionUrl();
      if (!url) {
        setStatus('先填写 GitHub 用户名、Gist ID 和文件名。', 'warn');
        return;
      }
      copyText(url, '订阅地址已复制。');
    });
    $('subscription').addEventListener('click', () => $('subscription').select());
    $('downloadYaml').addEventListener('click', downloadYaml);
    $('testAll').addEventListener('click', testAll);
    $('addController').addEventListener('click', addControllerToConfig);

    restoreSettings();
    if (window.lucide) window.lucide.createIcons();
    setStatus('填写 Gist 信息后读取，或把配置粘到原文框后解析。');
  </script>
</body>
</html>
